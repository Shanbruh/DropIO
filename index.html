const PEER_PREFIX = 'dropio-v2-';
const PROGRESS_MS = 100;

// ── Adaptive network detection ─────────────────────────────
interface NetworkProfile {
  chunkSize: number;
  maxBuffer: number;
  label: string;
}

function getNetworkProfile(): NetworkProfile {
  const nav = navigator as any;
  const conn = nav.connection || nav.mozConnection || nav.webkitConnection;
  if (conn) {
    const type = conn.effectiveType || conn.type || '';
    const downlink = conn.downlink || 10; // Mbps
    console.log(`[DropIO] Network: type=${type}, downlink=${downlink}Mbps`);
    if (type === '4g' || downlink >= 5) {
      return { chunkSize: 256 * 1024, maxBuffer: 16 * 1024 * 1024, label: 'fast (4g/wifi)' };
    }
    if (type === '3g' || downlink >= 1) {
      return { chunkSize: 64 * 1024, maxBuffer: 4 * 1024 * 1024, label: 'medium (3g)' };
    }
    return { chunkSize: 16 * 1024, maxBuffer: 1 * 1024 * 1024, label: 'slow (2g)' };
  }
  // Default: assume decent connection
  return { chunkSize: 256 * 1024, maxBuffer: 16 * 1024 * 1024, label: 'default' };
}

// ── ICE Servers from YOUR Metered.ca account ────────────────
const STUN_SERVERS: RTCIceServer[] = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun2.l.google.com:19302' },
  { urls: 'stun:stun3.l.google.com:19302' },
  { urls: 'stun:stun4.l.google.com:19302' },
];

let meteredIceServers: RTCIceServer[] | null = null;

async function fetchTurnCredentials(): Promise<void> {
  try {
    const resp = await fetch(
      'https://dropio.metered.live/api/v1/turn/credentials?apiKey=3d5d6d0e088e4985bf5eab9e5a75275bb071',
      { signal: AbortSignal.timeout(8000) }
    );
    if (resp.ok) {
      const servers = await resp.json();
      if (Array.isArray(servers) && servers.length > 0) {
        meteredIceServers = servers;
        console.log('[DropIO] ✅ Got Metered TURN servers:', servers.length);
      }
    }
  } catch (e) {
    console.warn('[DropIO] ⚠ TURN fetch failed:', e);
  }
}

// Fetch immediately on page load
fetchTurnCredentials();

function getIceServers(): RTCIceServer[] {
  if (meteredIceServers) {
    return [...STUN_SERVERS, ...meteredIceServers];
  }
  // Fallback: STUN only (same-network will work, cross-network may fail)
  console.warn('[DropIO] No TURN servers available — only same-network connections will work');
  return STUN_SERVERS;
}

function makePeerConfig() {
  return {
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true,
    debug: 1,
    config: {
      iceServers: getIceServers(),
      iceCandidatePoolSize: 10,
    },
  };
}

interface ChatMessage {
  id: string;
  text: string;
  sender: 'me' | 'peer';
  timestamp: number;
  type?: 'text' | 'voice';
  audioUrl?: string;
  audioDuration?: number;
}

interface FileTransferItem {
  id: string;
  name: string;
  size: number;
  progress: number;
  speed: number;
  status: 'sending' | 'receiving' | 'complete' | 'error';
  direction: 'send' | 'receive';
  url?: string;
  fileType?: string;
}

type CallStatus = 'idle' | 'calling' | 'incoming' | 'active';
type CallType = 'voice' | 'video';

interface PeerContextType {
  myCode: string;
  isConnected: boolean;
  isWaiting: boolean;
  isConnecting: boolean;
  error: string;
  messages: ChatMessage[];
  transfers: FileTransferItem[];
  callStatus: CallStatus;
  callType: CallType;
  localStream: MediaStream | null;
  remoteStream: MediaStream | null;
  createSession: () => void;
  joinSession: (code: string) => void;
  sendMessage: (text: string) => void;
  sendVoiceNote: (blob: Blob, duration: number) => void;
  sendFile: (file: File) => void;
  sendFiles: (files: File[]) => void;
  disconnect: () => void;
  clearError: () => void;
  startCall: (type: CallType) => void;
  acceptCall: () => void;
  endCall: () => void;
}

const PeerContext = createContext<PeerContextType | null>(null);

const usePeer = () => {
  const ctx = useContext(PeerContext);
  if (!ctx) throw new Error('usePeer must be used within PeerProvider');
  return ctx;
};

const uid = (): string => Math.random().toString(36).slice(2, 11) + Date.now().toString(36);

interface ActiveRecv {
  id: string; name: string; size: number; mime: string;
  parts: Blob[]; received: number; startTime: number;
}

function PeerProvider({ children }: { children: React.ReactNode }) {
  const [myCode, setMyCode] = useState('');
  const [isConnected, setIsConnected] = useState(false);
  const [isWaiting, setIsWaiting] = useState(false);
  const [isConnecting, setIsConnecting] = useState(false);
  const [error, setError] = useState('');
  const [messages, setMessages] = useState<ChatMessage[]>([]);
  const [transfers, setTransfers] = useState<FileTransferItem[]>([]);
  const [callStatus, setCallStatus] = useState<CallStatus>('idle');
  const [callType, setCallType] = useState<CallType>('voice');
  const [localStream, setLocalStream] = useState<MediaStream | null>(null);
  const [remoteStream, setRemoteStream] = useState<MediaStream | null>(null);

  const peerRef = useRef<Peer | null>(null);
  const connRef = useRef<DataConnection | null>(null);
  const mediaConnRef = useRef<MediaConnection | null>(null);
  const recvRef = useRef<ActiveRecv | null>(null);
  const sendingRef = useRef(false);
  const queueRef = useRef<{ file: File; id: string }[]>([]);
  const progressTsRef = useRef<Map<string, number>>(new Map());
  const pendingCallTypeRef = useRef<CallType>('voice');
  const destroyedRef = useRef(false);

  const clearError = useCallback(() => setError(''), []);

  const updateProgress = useCallback((id: string, progress: number, speed: number, force = false) => {
    const now = Date.now();
    const last = progressTsRef.current.get(id) ?? 0;
    if (!force && now - last < PROGRESS_MS) return;
    progressTsRef.current.set(id, now);
    setTransfers(p => p.map(t => (t.id === id ? { ...t, progress, speed } : t)));
  }, []);

  // ── Call helpers ──────────────────────────────────────────
  const stopStream = useCallback((stream: MediaStream | null) => {
    stream?.getTracks().forEach(t => t.stop());
  }, []);

  const endCall = useCallback(() => {
    try { mediaConnRef.current?.close(); } catch { /* */ }
    stopStream(localStream);
    stopStream(remoteStream);
    mediaConnRef.current = null;
    setLocalStream(null);
    setRemoteStream(null);
    setCallStatus('idle');
    try { connRef.current?.send({ t: 'call-end' }); } catch { /* */ }
  }, [localStream, remoteStream, stopStream]);

  const handleMediaConn = useCallback((mc: MediaConnection, stream: MediaStream) => {
    mediaConnRef.current = mc;
    mc.on('stream', (remote) => {
      setRemoteStream(remote);
      setCallStatus('active');
    });
    mc.on('close', () => {
      stopStream(stream);
      setLocalStream(null);
      setRemoteStream(null);
      setCallStatus('idle');
      mediaConnRef.current = null;
    });
    mc.on('error', () => {
      stopStream(stream);
      setLocalStream(null);
      setRemoteStream(null);
      setCallStatus('idle');
      mediaConnRef.current = null;
    });
  }, [stopStream]);

  const startCall = useCallback(async (type: CallType) => {
    const peer = peerRef.current;
    const conn = connRef.current;
    if (!peer || !conn?.open) return;
    setCallType(type);
    setCallStatus('calling');
    conn.send({ t: 'call-req', callType: type });

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: type === 'video',
      });
      setLocalStream(stream);
      const mc = peer.call(conn.peer, stream, { metadata: { callType: type } });
      handleMediaConn(mc, stream);
    } catch {
      setCallStatus('idle');
      setError('Could not access microphone/camera');
    }
  }, [handleMediaConn]);

  const acceptCall = useCallback(async () => {
    const type = pendingCallTypeRef.current;
    setCallType(type);
    setCallStatus('active');

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: type === 'video',
      });
      setLocalStream(stream);
      const mc = mediaConnRef.current;
      if (mc) {
        mc.answer(stream);
        handleMediaConn(mc, stream);
      }
      connRef.current?.send({ t: 'call-accept' });
    } catch {
      setCallStatus('idle');
      setError('Could not access microphone/camera');
    }
  }, [handleMediaConn]);

  // ── Handle incoming data ──────────────────────────────────
  const handleDataRef = useRef<(data: unknown) => void>(() => {});

  const handleData = useCallback((data: unknown) => {
    if (data instanceof ArrayBuffer || data instanceof Uint8Array || data instanceof Blob) {
      const r = recvRef.current;
      if (!r) return;
      let blob: Blob; let size: number;
      if (data instanceof Blob) { blob = data; size = data.size; }
      else if (data instanceof ArrayBuffer) { blob = new Blob([data]); size = data.byteLength; }
      else {
        const u8 = data as Uint8Array;
        const copy = new Uint8Array(u8.byteLength);
        copy.set(u8);
        blob = new Blob([copy.buffer as ArrayBuffer]);
        size = u8.byteLength;
      }
      r.parts.push(blob);
      r.received += size;
      if (r.parts.length >= 500) r.parts = [new Blob(r.parts)];
      const progress = Math.min(r.received / r.size, 1);
      const elapsed = (Date.now() - r.startTime) / 1000;
      const speed = elapsed > 0 ? r.received / elapsed : 0;
      updateProgress(r.id, progress, speed);
      return;
    }

    if (typeof data === 'object' && data !== null) {
      const m = data as Record<string, unknown>;

      if (m.t === 'chat') {
        const audioData = m.audioData as string | undefined;
        setMessages(p => [...p, {
          id: (m.id as string) ?? uid(), text: m.text as string, sender: 'peer', timestamp: (m.ts as number) ?? Date.now(),
          type: (m.msgType as 'text' | 'voice') ?? 'text',
          audioUrl: audioData ? URL.createObjectURL(
            new Blob([Uint8Array.from(atob(audioData), c => c.charCodeAt(0))], { type: 'audio/webm' })
          ) : undefined,
          audioDuration: m.audioDuration as number | undefined,
        }]);
        return;
      }
      if (m.t === 'fs') {
        recvRef.current = {
          id: m.id as string, name: m.name as string, size: m.size as number,
          mime: (m.mime as string) ?? 'application/octet-stream',
          parts: [], received: 0, startTime: Date.now(),
        };
        setTransfers(p => [...p, {
          id: m.id as string, name: m.name as string, size: m.size as number, progress: 0, speed: 0,
          status: 'receiving', direction: 'receive', fileType: m.mime as string,
        }]);
        return;
      }
      if (m.t === 'fe') {
        const r = recvRef.current;
        if (r && r.id === m.id) {
          const blob = new Blob(r.parts, { type: r.mime });
          const url = URL.createObjectURL(blob);
          r.parts = [];
          recvRef.current = null;
          setTransfers(p => p.map(t =>
            t.id === (m.id as string) ? { ...t, status: 'complete' as const, progress: 1, speed: 0, url } : t
          ));
          progressTsRef.current.delete(m.id as string);
        }
        return;
      }
      if (m.t === 'call-req') {
        pendingCallTypeRef.current = (m.callType as CallType) || 'voice';
        setCallType((m.callType as CallType) || 'voice');
        setCallStatus('incoming');
        return;
      }
      if (m.t === 'call-accept') {
        setCallStatus('active');
        return;
      }
      if (m.t === 'call-end') {
        try { mediaConnRef.current?.close(); } catch { /* */ }
        mediaConnRef.current = null;
        setLocalStream(prev => { prev?.getTracks().forEach(t => t.stop()); return null; });
        setRemoteStream(prev => { prev?.getTracks().forEach(t => t.stop()); return null; });
        setCallStatus('idle');
        return;
      }
      if (m.t === 'ping') {
        try { connRef.current?.send({ t: 'pong' }); } catch { /* */ }
        return;
      }
    }
  }, [updateProgress]);

  // Keep ref always up to date
  useEffect(() => {
    handleDataRef.current = handleData;
  }, [handleData]);

  // ── Wire up a DataConnection ────────────────────────────────
  const wireConn = useCallback((conn: DataConnection) => {
    connRef.current = conn;

    conn.on('open', () => {
      console.log('[DropIO] DataConnection OPEN');
      setIsConnected(true);
      setIsWaiting(false);
      setIsConnecting(false);
      setError('');
      // Force arraybuffer for binary
      try {
        const dc = (conn as any).dataChannel ?? (conn as any)._dc;
        if (dc) dc.binaryType = 'arraybuffer';
      } catch { /* */ }
    });

    conn.on('data', (raw: unknown) => {
      handleDataRef.current(raw);
    });

    conn.on('close', () => {
      console.log('[DropIO] DataConnection CLOSED');
      setIsConnected(false);
      connRef.current = null;
    });

    conn.on('error', (e) => {
      console.error('[DropIO] DataConnection error:', e);
    });
  }, []);

  const setupPeerCallListener = useCallback((peer: Peer) => {
    peer.on('call', (mc) => {
      mediaConnRef.current = mc;
      const ct = mc.metadata?.callType || 'voice';
      pendingCallTypeRef.current = ct;
      setCallType(ct);
      setCallStatus('incoming');
    });
  }, []);

  const cleanup = useCallback(() => {
    destroyedRef.current = true;
    try { connRef.current?.close(); } catch { /* */ }
    try { mediaConnRef.current?.close(); } catch { /* */ }
    try { peerRef.current?.destroy(); } catch { /* */ }
    connRef.current = null;
    mediaConnRef.current = null;
    peerRef.current = null;
    setIsConnected(false);
    setIsWaiting(false);
    setIsConnecting(false);
    setMyCode('');
  }, []);

  const disconnect = useCallback(() => {
    stopStream(localStream);
    stopStream(remoteStream);
    cleanup();
    setMessages([]);
    setTransfers([]);
    setCallStatus('idle');
    setLocalStream(null);
    setRemoteStream(null);
    recvRef.current = null;
    sendingRef.current = false;
    queueRef.current = [];
    progressTsRef.current.clear();
  }, [cleanup, localStream, remoteStream, stopStream]);

  const genCode = useCallback((): string => {
    const c = 'abcdefghjkmnpqrstuvwxyz23456789';
    return Array.from({ length: 3 }, () => c[Math.floor(Math.random() * c.length)]).join('');
  }, []);

  // ── CREATE SESSION ────────────────────────────────────────
  const createSession = useCallback(() => {
    cleanup();
    destroyedRef.current = false;
    setIsWaiting(true);
    setError('');

    let attempts = 0;
    const maxAttempts = 5;

    const tryCreate = () => {
      if (destroyedRef.current) return;
      attempts++;
      const code = genCode();
      const peerId = PEER_PREFIX + code;

      console.log(`[DropIO] Creating room "${code}" (attempt ${attempts})`);

      const peer = new Peer(peerId, makePeerConfig());
      peerRef.current = peer;

      const timeout = setTimeout(() => {
        console.warn(`[DropIO] Server timeout (attempt ${attempts})`);
        try { peer.destroy(); } catch { /* */ }
        if (!destroyedRef.current && attempts < maxAttempts) {
          setTimeout(tryCreate, 500);
        } else if (!destroyedRef.current) {
          setError('Server not responding. Check your internet and try again.');
          setIsWaiting(false);
        }
      }, 15000);

      peer.on('open', (id) => {
        clearTimeout(timeout);
        console.log(`[DropIO] Server connected! ID: ${id}, Code: ${code}`);
        setMyCode(code);
      });

      peer.on('connection', (incoming) => {
        console.log('[DropIO] Incoming connection from peer');
        wireConn(incoming);
      });

      setupPeerCallListener(peer);

      peer.on('error', (err: any) => {
        clearTimeout(timeout);
        const errType = err?.type ?? '';
        console.error(`[DropIO] Peer error: ${errType}`, err?.message);

        if (errType === 'unavailable-id' && !destroyedRef.current && attempts < maxAttempts) {
          try { peer.destroy(); } catch { /* */ }
          setTimeout(tryCreate, 300);
        } else if (!destroyedRef.current) {
          setError(errType === 'unavailable-id'
            ? 'Room code collision. Try again.'
            : `Connection error: ${err?.message || errType}`
          );
          setIsWaiting(false);
        }
      });

      peer.on('disconnected', () => {
        console.warn('[DropIO] Disconnected from signaling server, reconnecting...');
        if (peerRef.current === peer && !peer.destroyed && !destroyedRef.current) {
          setTimeout(() => {
            try { peer.reconnect(); } catch { /* */ }
          }, 1000);
        }
      });
    };

    tryCreate();
  }, [cleanup, genCode, wireConn, setupPeerCallListener]);

  // ── JOIN SESSION ──────────────────────────────────────────
  const joinSession = useCallback((code: string) => {
    cleanup();
    destroyedRef.current = false;
    setIsConnecting(true);
    setError('');

    const normalizedCode = code.toLowerCase().trim();
    const targetPeerId = PEER_PREFIX + normalizedCode;

    let attempts = 0;
    const maxAttempts = 3;

    const tryJoin = () => {
      if (destroyedRef.current) return;
      attempts++;

      console.log(`[DropIO] Joining room "${normalizedCode}" → peer "${targetPeerId}" (attempt ${attempts})`);

      const peer = new Peer(makePeerConfig());
      peerRef.current = peer;

      let connected = false;

      const timeout = setTimeout(() => {
        if (!connected && !destroyedRef.current) {
          console.warn(`[DropIO] Join timeout (attempt ${attempts})`);
          try { peer.destroy(); } catch { /* */ }
          if (attempts < maxAttempts) {
            setTimeout(tryJoin, 1000);
          } else {
            setError('Connection timed out. Make sure the other device has the room open and both are online.');
            setIsConnecting(false);
          }
        }
      }, 20000);

      peer.on('open', (myId) => {
        console.log(`[DropIO] Signaling server connected, my ID: ${myId}`);
        console.log(`[DropIO] Connecting to peer: ${targetPeerId}`);

        const conn = peer.connect(targetPeerId, { reliable: true });

        conn.on('open', () => {
          connected = true;
          clearTimeout(timeout);
          console.log('[DropIO] DataConnection OPEN - connected to peer!');
          connRef.current = conn;
          setIsConnected(true);
          setIsWaiting(false);
          setIsConnecting(false);
          setError('');
          try {
            const dc = (conn as any).dataChannel ?? (conn as any)._dc;
            if (dc) dc.binaryType = 'arraybuffer';
          } catch { /* */ }
        });

        conn.on('data', (raw: unknown) => {
          handleDataRef.current(raw);
        });

        conn.on('close', () => {
          console.log('[DropIO] DataConnection closed');
          setIsConnected(false);
          connRef.current = null;
        });

        conn.on('error', (e: any) => {
          console.error('[DropIO] DataConnection error:', e);
          if (!connected && !destroyedRef.current) {
            clearTimeout(timeout);
            try { peer.destroy(); } catch { /* */ }
            if (attempts < maxAttempts) {
              setTimeout(tryJoin, 1000);
            } else {
              setError('Connection failed. Try again.');
              setIsConnecting(false);
            }
          }
        });
      });

      setupPeerCallListener(peer);

      peer.on('error', (err: any) => {
        const errType = err?.type ?? '';
        console.error(`[DropIO] Peer error: ${errType}`, err?.message);

        if (errType === 'peer-unavailable') {
          clearTimeout(timeout);
          connected = true; // prevent timeout handler
          setError('Room not found. Check the code and make sure the other device is waiting.');
          setIsConnecting(false);
          try { peer.destroy(); } catch { /* */ }
        } else if (!connected && !destroyedRef.current) {
          clearTimeout(timeout);
          try { peer.destroy(); } catch { /* */ }
          if (attempts < maxAttempts) {
            setTimeout(tryJoin, 1000);
          } else {
            setError(`Connection failed: ${err?.message || errType}`);
            setIsConnecting(false);
          }
        }
      });

      peer.on('disconnected', () => {
        if (!connected && peerRef.current === peer && !peer.destroyed && !destroyedRef.current) {
          console.warn('[DropIO] Signaling disconnected, retrying...');
          setTimeout(() => {
            try { peer.reconnect(); } catch { /* */ }
          }, 1000);
        }
      });
    };

    tryJoin();
  }, [cleanup, setupPeerCallListener]);

  // ── Send message ──────────────────────────────────────────
  const sendMessage = useCallback((text: string) => {
    const conn = connRef.current;
    if (!conn?.open) return;
    const msg: ChatMessage = { id: uid(), text, sender: 'me', timestamp: Date.now(), type: 'text' };
    conn.send({ t: 'chat', id: msg.id, text, ts: msg.timestamp, msgType: 'text' });
    setMessages(p => [...p, msg]);
  }, []);

  const sendVoiceNote = useCallback((blob: Blob, duration: number) => {
    const conn = connRef.current;
    if (!conn?.open) return;
    const reader = new FileReader();
    reader.onload = () => {
      const arr = reader.result as ArrayBuffer;
      const base64 = btoa(String.fromCharCode(...new Uint8Array(arr)));
      const id = uid();
      const audioUrl = URL.createObjectURL(blob);
      conn.send({
        t: 'chat', id, text: '🎤 Voice note', ts: Date.now(),
        msgType: 'voice', audioData: base64, audioDuration: duration,
      });
      setMessages(p => [...p, {
        id, text: '🎤 Voice note', sender: 'me', timestamp: Date.now(),
        type: 'voice', audioUrl, audioDuration: duration,
      }]);
    };
    reader.readAsArrayBuffer(blob);
  }, []);

  // ── File transfer ─────────────────────────────────────────
  const waitForBuffer = useCallback(async (conn: DataConnection, maxBuf: number) => {
    const dc = (conn as any).dataChannel ?? (conn as any)._dc;
    if (!dc) return;
    while (dc.bufferedAmount > maxBuf) {
      await new Promise(r => setTimeout(r, 10));
      if (dc.readyState !== 'open') throw new Error('Connection lost during transfer');
    }
  }, []);

  const doSend = useCallback(async (file: File, id: string) => {
    const conn = connRef.current;
    if (!conn?.open) throw new Error('Not connected');

    const net = getNetworkProfile();
    console.log(`[DropIO] Sending "${file.name}" (${(file.size / 1048576).toFixed(1)}MB) — network: ${net.label}, chunk: ${net.chunkSize / 1024}KB`);

    conn.send({ t: 'fs', id, name: file.name, size: file.size, mime: file.type || 'application/octet-stream' });
    await new Promise(r => setTimeout(r, 50));

    const t0 = Date.now();
    let sent = 0;
    const chunkSize = net.chunkSize;
    const maxBuf = net.maxBuffer;

    for (let off = 0; off < file.size; off += chunkSize) {
      if (!conn.open) throw new Error('Connection lost');
      const end = Math.min(off + chunkSize, file.size);
      const chunk = await file.slice(off, end).arrayBuffer();
      conn.send(chunk);
      sent += chunk.byteLength;
      await waitForBuffer(conn, maxBuf);

      const now = Date.now();
      const elapsed = (now - t0) / 1000;
      const speed = elapsed > 0 ? sent / elapsed : 0;
      updateProgress(id, sent / file.size, speed);
    }

    // Wait for buffer to drain completely
    const dc = (conn as any).dataChannel ?? (conn as any)._dc;
    if (dc) {
      while (dc.bufferedAmount > 0) {
        await new Promise(r => setTimeout(r, 20));
        if (dc.readyState !== 'open') break;
      }
    }
    await new Promise(r => setTimeout(r, 150));
    conn.send({ t: 'fe', id });
  }, [updateProgress, waitForBuffer]);

  const processQueue = useCallback(async () => {
    if (sendingRef.current) return;
    sendingRef.current = true;
    while (queueRef.current.length > 0) {
      const { file, id } = queueRef.current[0];
      try {
        await doSend(file, id);
        setTransfers(p => p.map(t => t.id === id ? { ...t, status: 'complete' as const, progress: 1, speed: 0 } : t));
      } catch (err) {
        console.error('[DropIO] Send error:', err);
        setTransfers(p => p.map(t => t.id === id ? { ...t, status: 'error' as const, speed: 0 } : t));
      }
      progressTsRef.current.delete(id);
      queueRef.current.shift();
    }
    sendingRef.current = false;
  }, [doSend]);

  const sendFile = useCallback((file: File) => {
    if (!connRef.current?.open) return;
    const id = uid();
    setTransfers(p => [...p, {
      id, name: file.name, size: file.size, progress: 0, speed: 0,
      status: 'sending', direction: 'send', fileType: file.type,
    }]);
    queueRef.current.push({ file, id });
    processQueue();
  }, [processQueue]);

  const sendFiles = useCallback((files: File[]) => {
    files.forEach(f => sendFile(f));
  }, [sendFile]);

  // Cleanup on unmount
  useEffect(() => {
    return () => {
      destroyedRef.current = true;
      try { connRef.current?.close(); } catch { /* */ }
      try { peerRef.current?.destroy(); } catch { /* */ }
    };
  }, []);

  return (
    <PeerContext.Provider value={{
      myCode, isConnected, isWaiting, isConnecting, error,
      messages, transfers, callStatus, callType, localStream, remoteStream,
      createSession, joinSession, sendMessage, sendVoiceNote, sendFile, sendFiles,
      disconnect, clearError, startCall, acceptCall, endCall,
    }}>
      {children}
    </PeerContext.Provider>
  );
}

function PairScreen() {
  const { createSession, joinSession, myCode, isConnecting, error, clearError } = usePeer();

  const [code, setCode] = useState(['', '', '']);
  const [copied, setCopied] = useState(false);
  const inputsRef = useRef<(HTMLInputElement | null)[]>([]);

  useEffect(() => {
    if (mode === 'join') inputsRef.current[0]?.focus();
  }, [mode]);

  const handleInput = (i: number, v: string) => {
    const ch = v.replace(/[^a-zA-Z0-9]/g, '').toLowerCase().slice(-1);
    const next = [...code];
    next[i] = ch;
    setCode(next);
    if (ch && i < 2) inputsRef.current[i + 1]?.focus();
    if (i === 2 && ch) {
      const full = next.join('');
      if (full.length === 3) joinSession(full);
    }
  };

  const handleKey = (i: number, e: React.KeyboardEvent) => {
    if (e.key === 'Backspace' && !code[i] && i > 0) {
      inputsRef.current[i - 1]?.focus();
    }
  };

  const handlePaste = (e: React.ClipboardEvent) => {
    e.preventDefault();
    const txt = e.clipboardData.getData('text').replace(/[^a-zA-Z0-9]/g, '').toLowerCase().slice(0, 3);
    const next = ['', '', ''];
    for (let i = 0; i < txt.length; i++) next[i] = txt[i];
    setCode(next);
    if (txt.length === 3) {
      joinSession(txt);
    } else {
      inputsRef.current[txt.length]?.focus();
    }
  };

  const copyCode = () => {
    navigator.clipboard.writeText(myCode.toUpperCase());
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

    <div className="min-h-screen flex flex-col items-center justify-center px-4 py-8 relative overflow-hidden">

      <div className="absolute inset-0 overflow-hidden pointer-events-none">

        <div className="text-center mb-10 animate-fade-in">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-[var(--color-accent)] to-[var(--color-accent2)] mb-4 shadow-lg shadow-[var(--color-accent-glow)]">
            <Zap size={28} className="text-white" />
          </div>
          <h1 className="text-3xl font-bold tracking-tight bg-gradient-to-r from-white to-[var(--color-text2)] bg-clip-text text-transparent">
            DropIO
          </h1>
          <p className="text-[var(--color-text3)] text-sm mt-1.5">Peer-to-peer file transfer & chat</p>
        </div>

        {error && (
          <div className="mb-5 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-2 animate-fade-in" onClick={clearError}>
            <span className="flex-1">{error}</span>
            <span className="text-red-500/50 text-xs cursor-pointer">✕</span>
          </div>
        )}

        {/* Mode: Pick */}
        {mode === 'pick' && (
          <div className="space-y-3 animate-slide-up">
            <button
              onClick={() => { setMode('create'); createSession(); }}
              className="w-full glass rounded-2xl p-5 flex items-center gap-4 hover:border-[var(--color-accent)]/40 transition-all group active:scale-[0.98]"
            >
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-[var(--color-accent)] to-[var(--color-accent2)] flex items-center justify-center flex-shrink-0 shadow-lg shadow-[var(--color-accent-glow)]">
                <Wifi size={20} className="text-white" />
              </div>

                <div className="font-semibold text-[var(--color-text)]">Create Room</div>

              </div>
              <ArrowRight size={18} className="text-[var(--color-text3)] group-hover:text-[var(--color-accent)] transition-colors" />
            </button>

            <button

              ← Back
            </button>
          </div>
        )}

        {/* Mode: Join */}
        {mode === 'join' && (
          <div className="animate-slide-up">
            <div className="glass rounded-2xl p-8 text-center">
              {isConnecting ? (
                <div className="py-6">
                  <Loader2 size={36} className="mx-auto text-[var(--color-accent2)] animate-spin mb-4" />
                  <p className="text-[var(--color-text2)] text-sm">Connecting...</p>
                </div>
              ) : (
                <>
                  <p className="text-[var(--color-text3)] text-xs uppercase tracking-widest mb-5">Enter Room Code</p>
                  <div className="flex justify-center gap-3 mb-6">

function VoicePlayer({ url, duration, isMine }: { url: string; duration: number; isMine: boolean }) {
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const audioRef = useRef<HTMLAudioElement | null>(null);

  useEffect(() => {
    const a = new Audio(url);
    audioRef.current = a;
    a.addEventListener('timeupdate', () => setProgress(a.currentTime / (a.duration || duration)));
    a.addEventListener('ended', () => { setPlaying(false); setProgress(0); });
    return () => { a.pause(); a.src = ''; };
  }, [url, duration]);

  const toggle = () => {
    const a = audioRef.current;
    if (!a) return;
    if (playing) { a.pause(); setPlaying(false); }
    else { a.play(); setPlaying(true); }
  };

  const fmt = (s: number) => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

  return (
    <div className="flex items-center gap-3 min-w-[180px]">
      <button onClick={toggle} className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${isMine ? 'bg-white/20 hover:bg-white/30' : 'bg-[var(--color-accent)]/20 hover:bg-[var(--color-accent)]/30'} transition-colors`}>
        {playing ? <Pause size={14} className={isMine ? 'text-white' : 'text-[var(--color-accent)]'} /> : <Play size={14} className={`${isMine ? 'text-white' : 'text-[var(--color-accent)]'} ml-0.5`} />}
      </button>
      <div className="flex-1">
        <div className={`h-1.5 rounded-full ${isMine ? 'bg-white/20' : 'bg-[var(--color-border)]'} overflow-hidden`}>
          <div className={`h-full rounded-full transition-all ${isMine ? 'bg-white/70' : 'bg-[var(--color-accent)]'}`} style={{ width: `${progress * 100}%` }} />
        </div>
        <div className={`text-[10px] mt-1 ${isMine ? 'text-white/60' : 'text-[var(--color-text3)]'}`}>{fmt(duration)}</div>
      </div>
    </div>
  );
}

function ChatView() {
  const { messages, sendMessage, sendVoiceNote } = usePeer();
  const [text, setText] = useState('');
  const [recording, setRecording] = useState(false);
  const [recordTime, setRecordTime] = useState(0);
  const bottomRef = useRef<HTMLDivElement>(null);
  const recorderRef = useRef<MediaRecorder | null>(null);
  const chunksRef = useRef<Blob[]>([]);
  const timerRef = useRef<ReturnType<typeof setInterval> | null>(null);
  const startTimeRef = useRef(0);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const handleSend = () => {
    const t = text.trim();
    if (!t) return;
    sendMessage(t);
    setText('');
  };

  const handleKey = (e: React.KeyboardEvent) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  const startRecording = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      chunksRef.current = [];
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        const dur = (Date.now() - startTimeRef.current) / 1000;
        if (dur > 0.5) sendVoiceNote(blob, dur);
        setRecording(false);
        setRecordTime(0);
        if (timerRef.current) clearInterval(timerRef.current);
      };
      recorderRef.current = mr;
      startTimeRef.current = Date.now();
      mr.start();
      setRecording(true);
      timerRef.current = setInterval(() => {
        setRecordTime((Date.now() - startTimeRef.current) / 1000);
      }, 100);
    } catch {
      // mic access denied
    }
  }, [sendVoiceNote]);

  const stopRecording = useCallback(() => {
    recorderRef.current?.stop();
  }, []);

  const fmt = (s: number) => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

  return (
    <div className="flex flex-col h-full">
      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-2">
        {messages.length === 0 && (
          <div className="flex flex-col items-center justify-center h-full text-center">
            <div className="w-14 h-14 rounded-2xl bg-[var(--color-surface2)] border border-[var(--color-border)] flex items-center justify-center mb-3 opacity-50">
              <Send size={20} className="text-[var(--color-text3)]" />
            </div>
            <p className="text-[var(--color-text3)] text-sm">No messages yet</p>
            <p className="text-[var(--color-text3)] text-xs mt-1 opacity-60">Send a message or voice note</p>
          </div>
        )}
        {messages.map((m) => (

const fmtSize = (b: number) => {
  if (b < 1024) return `${b} B`;
  if (b < 1048576) return `${(b / 1024).toFixed(1)} KB`;
  if (b < 1073741824) return `${(b / 1048576).toFixed(1)} MB`;
  return `${(b / 1073741824).toFixed(2)} GB`;
};

const fmtSpeed = (b: number) => {
  if (b < 1048576) return `${(b / 1024).toFixed(0)} KB/s`;
  return `${(b / 1048576).toFixed(1)} MB/s`;
};

const getIcon = (name: string, type?: string) => {
  const ext = name.split('.').pop()?.toLowerCase() ?? '';
  if (type?.startsWith('image') || ['png','jpg','jpeg','gif','webp','svg','bmp','ico'].includes(ext)) return <Image size={18} />;
  if (type?.startsWith('video') || ['mp4','mov','avi','mkv','webm'].includes(ext)) return <Film size={18} />;
  if (type?.startsWith('audio') || ['mp3','wav','aac','flac','ogg','m4a'].includes(ext)) return <Music size={18} />;
  if (['zip','rar','7z','tar','gz','bz2','xz'].includes(ext)) return <Archive size={18} />;
  if (['pdf','doc','docx','txt','rtf','csv','xls','xlsx','ppt','pptx'].includes(ext)) return <FileText size={18} />;
  return <File size={18} />;
};

function FileCard({ item }: { item: FileTransferItem }) {
  const pct = Math.round(item.progress * 100);
  const isSend = item.direction === 'send';

  return (
    <div className="glass rounded-xl p-3.5 animate-fade-in">
      <div className="flex items-start gap-3">
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${
          item.status === 'complete' ? 'bg-[var(--color-green)]/10 text-[var(--color-green)]'
          : item.status === 'error' ? 'bg-[var(--color-red)]/10 text-[var(--color-red)]'
          : isSend ? 'bg-[var(--color-accent)]/10 text-[var(--color-accent)]'
          : 'bg-[var(--color-accent2)]/10 text-[var(--color-accent2)]'
        }`}>
          {getIcon(item.name, item.fileType)}
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <p className="text-sm font-medium text-[var(--color-text)] truncate flex-1">{item.name}</p>
            {item.status === 'complete' ? (
              <CheckCircle2 size={14} className="text-[var(--color-green)] flex-shrink-0" />
            ) : item.status === 'error' ? (
              <AlertCircle size={14} className="text-[var(--color-red)] flex-shrink-0" />
            ) : (
              <span className={`flex items-center gap-1 text-xs flex-shrink-0 ${isSend ? 'text-[var(--color-accent)]' : 'text-[var(--color-accent2)]'}`}>
                {isSend ? <ArrowUp size={10} /> : <ArrowDown size={10} />}
                {pct}%
              </span>
            )}
          </div>
          <div className="flex items-center gap-2 mt-1">
            <span className="text-[11px] text-[var(--color-text3)]">{fmtSize(item.size)}</span>
            {item.status !== 'complete' && item.status !== 'error' && item.speed > 0 && (
              <>
                <span className="text-[var(--color-border)]">·</span>
                <span className="text-[11px] text-[var(--color-text3)]">{fmtSpeed(item.speed)}</span>
              </>
            )}

          {(item.status === 'sending' || item.status === 'receiving') && (

                className={`h-full rounded-full transition-all duration-300 ${isSend ? 'bg-gradient-to-r from-[var(--color-accent)] to-[var(--color-accent2)]' : 'bg-gradient-to-r from-[var(--color-accent2)] to-[var(--color-green)]'}`}
                style={{ width: `${pct}%` }}
              />

          )}

      </div>
      {item.status === 'complete' && item.url && (
        <a href={item.url} download={item.name} className="mt-3 flex items-center justify-center gap-2 w-full py-2 rounded-lg bg-[var(--color-green)]/10 text-[var(--color-green)] text-xs font-medium hover:bg-[var(--color-green)]/15 transition-colors">
          <Download size={14} /> Download

function FileView() {
  const { sendFile, sendFiles, transfers } = usePeer();
  const fileRef = useRef<HTMLInputElement>(null);
  const folderRef = useRef<HTMLInputElement>(null);
  const [dragging, setDragging] = useState(false);
  const dragCountRef = useRef(0);

  const handleFiles = useCallback((fl: FileList | File[]) => {
    const files = Array.from(fl);
    if (files.length === 1) sendFile(files[0]);
    else if (files.length > 1) sendFiles(files);
  }, [sendFile, sendFiles]);

  const onDragEnter = (e: React.DragEvent) => { e.preventDefault(); dragCountRef.current++; setDragging(true); };
  const onDragLeave = (e: React.DragEvent) => { e.preventDefault(); dragCountRef.current--; if (dragCountRef.current <= 0) { setDragging(false); dragCountRef.current = 0; } };
  const onDragOver = (e: React.DragEvent) => e.preventDefault();
  const onDrop = (e: React.DragEvent) => {
    e.preventDefault();
    setDragging(false);
    dragCountRef.current = 0;

    // Handle folder drops via DataTransferItemList
    const items = e.dataTransfer.items;
    if (items) {
      const allFiles: File[] = [];
      let pending = 0;
      let done = false;

      const finish = () => {
        if (done) return;
        done = true;
        if (allFiles.length > 0) handleFiles(allFiles);
      };

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        if (item.kind === 'file') {
          const entry = (item as any).webkitGetAsEntry?.() || (item as any).getAsEntry?.();
          if (entry) {
            pending++;
            traverseEntry(entry, allFiles, () => {
              pending--;
              if (pending === 0) finish();
            });
          } else {
            const f = item.getAsFile();
            if (f) allFiles.push(f);
          }
        }
      }
      if (pending === 0) finish();
    } else if (e.dataTransfer.files.length) {
      handleFiles(e.dataTransfer.files);
    }
  };

  return (
    <div className="flex flex-col h-full" onDragEnter={onDragEnter} onDragLeave={onDragLeave} onDragOver={onDragOver} onDrop={onDrop}>
      <input ref={fileRef} type="file" multiple className="hidden" onChange={e => e.target.files && handleFiles(e.target.files)} />
      <input ref={folderRef} type="file" multiple {...{ webkitdirectory: '', directory: '' } as any} className="hidden" onChange={e => e.target.files && handleFiles(e.target.files)} />

      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
        {/* Drop zone / upload buttons */}
        <div className={`relative rounded-2xl border-2 border-dashed transition-all ${
          dragging ? 'border-[var(--color-accent)] bg-[var(--color-accent)]/5 scale-[1.01]' : 'border-[var(--color-border)] hover:border-[var(--color-text3)]'
        } p-6 text-center`}>
          {dragging && (
            <div className="absolute inset-0 flex items-center justify-center rounded-2xl bg-[var(--color-accent)]/10 z-10">
              <div className="text-[var(--color-accent)] font-semibold flex items-center gap-2">
                <Upload size={20} /> Drop files here
              </div>
            </div>
          )}
          <div className={dragging ? 'opacity-0' : ''}>
            <div className="w-12 h-12 mx-auto rounded-xl bg-[var(--color-surface2)] border border-[var(--color-border)] flex items-center justify-center mb-3">
              <Upload size={20} className="text-[var(--color-text3)]" />
            </div>
            <p className="text-sm text-[var(--color-text2)] mb-1">Drop files or folders here</p>
            <p className="text-xs text-[var(--color-text3)] mb-4">or choose an option below</p>
            <div className="flex gap-2 justify-center flex-wrap">
              <button onClick={() => fileRef.current?.click()} className="btn-primary text-xs !py-2 !px-4 !rounded-xl flex items-center gap-1.5">
                <Upload size={14} /> Files
              </button>
              <button onClick={() => folderRef.current?.click()} className="text-xs py-2 px-4 rounded-xl bg-[var(--color-surface2)] border border-[var(--color-border)] text-[var(--color-text2)] hover:border-[var(--color-accent)]/40 hover:text-[var(--color-accent)] transition-all flex items-center gap-1.5">
                <FolderOpen size={14} /> Folder
              </button>
            </div>
          </div>
        </div>

        {/* Transfer list */}
        {transfers.length > 0 && (
          <div className="space-y-2">
            <div className="flex items-center justify-between px-1">
              <h3 className="text-xs font-medium text-[var(--color-text3)] uppercase tracking-wider">Transfers</h3>
              <span className="text-[11px] text-[var(--color-text3)]">{transfers.filter(t => t.status === 'complete').length}/{transfers.length} done</span>
            </div>
            {transfers.map(item => <FileCard key={item.id} item={item} />)}
          </div>
        )}
      </div>
    </div>
  );
}

function traverseEntry(entry: any, files: File[], done: () => void) {
  if (entry.isFile) {
    entry.file((f: File) => { files.push(f); done(); }, () => done());
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    const readAll = (allEntries: any[]) => {
      reader.readEntries((entries: any[]) => {
        if (entries.length === 0) {
          let pending = allEntries.length;
          if (pending === 0) { done(); return; }
          allEntries.forEach(e => traverseEntry(e, files, () => { pending--; if (pending === 0) done(); }));
        } else {
          readAll(allEntries.concat(entries));
        }
      }, () => done());
    };
    readAll([]);
  } else {
    done();
  }
}

function CallOverlay() {
  const { callStatus, callType, localStream, remoteStream, endCall, acceptCall } = usePeer();
  const remoteVideoRef = useRef<HTMLVideoElement>(null);
  const localVideoRef = useRef<HTMLVideoElement>(null);
  const [muted, setMuted] = useState(false);
  const [camOff, setCamOff] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(0);

  useEffect(() => {
    if (callStatus === 'active') {
      startRef.current = Date.now();
      const iv = setInterval(() => setElapsed(Math.floor((Date.now() - startRef.current) / 1000)), 1000);
      return () => clearInterval(iv);
    } else {
      setElapsed(0);
    }
  }, [callStatus]);

  useEffect(() => {
    if (remoteVideoRef.current && remoteStream) {
      remoteVideoRef.current.srcObject = remoteStream;
    }
  }, [remoteStream]);

  useEffect(() => {
    if (localVideoRef.current && localStream) {
      localVideoRef.current.srcObject = localStream;
    }
  }, [localStream]);

  const toggleMute = () => {
    if (localStream) {
      localStream.getAudioTracks().forEach(t => { t.enabled = !t.enabled; });
      setMuted(!muted);
    }
  };

  const toggleCam = () => {
    if (localStream) {
      localStream.getVideoTracks().forEach(t => { t.enabled = !t.enabled; });
      setCamOff(!camOff);
    }
  };

  const fmt = (s: number) => `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;

  if (callStatus === 'idle') return null;

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-[var(--color-bg)]/95 backdrop-blur-xl">
      {/* Content */}
      <div className="flex-1 flex items-center justify-center relative overflow-hidden">
        {callType === 'video' && callStatus === 'active' ? (
          <>
            {/* Remote video full */}
            <video ref={remoteVideoRef} autoPlay playsInline className="absolute inset-0 w-full h-full object-cover" />
            {/* Local video PiP */}
            <div className="absolute top-4 right-4 w-28 h-40 sm:w-36 sm:h-48 rounded-2xl overflow-hidden border-2 border-[var(--color-border)] shadow-2xl z-10">
              <video ref={localVideoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
              {camOff && (
                <div className="absolute inset-0 bg-[var(--color-surface)] flex items-center justify-center">
                  <VideoOff size={20} className="text-[var(--color-text3)]" />
                </div>
              )}
            </div>
          </>
        ) : (
          <div className="text-center">
            {/* Voice call avatar */}
            <div className={`w-24 h-24 mx-auto rounded-full bg-gradient-to-br from-[var(--color-accent)] to-[var(--color-accent2)] flex items-center justify-center mb-6 ${callStatus === 'active' ? '' : 'animate-pulse-ring'}`}>
              <Phone size={32} className="text-white" />
            </div>
            <p className="text-lg font-semibold text-[var(--color-text)]">
              {callStatus === 'calling' ? 'Calling...' : callStatus === 'incoming' ? 'Incoming Call' : callType === 'video' ? 'Video Call' : 'Voice Call'}
            </p>
            {callStatus === 'active' && (
              <p className="text-[var(--color-green)] text-sm font-mono mt-2">{fmt(elapsed)}</p>
            )}
            {/* Hidden audio elements for voice-only calls */}
            <audio ref={remoteVideoRef as any} autoPlay playsInline className="hidden" />
          </div>
        )}
      </div>

      {/* Controls */}
      <div className="flex-shrink-0 pb-12 pt-4 px-6">
        {callStatus === 'incoming' ? (
          <div className="flex justify-center gap-8">
            <button onClick={endCall} className="w-16 h-16 rounded-full bg-[var(--color-red)] flex items-center justify-center shadow-lg shadow-red-500/30 active:scale-95 transition-transform">
              <PhoneOff size={24} className="text-white" />
            </button>
            <button onClick={acceptCall} className="w-16 h-16 rounded-full bg-[var(--color-green)] flex items-center justify-center shadow-lg shadow-green-500/30 active:scale-95 transition-transform">
              <Phone size={24} className="text-white" />
            </button>
          </div>
        ) : (
          <div className="flex justify-center gap-5">
            <button onClick={toggleMute} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all active:scale-95 ${muted ? 'bg-[var(--color-red)]/20 text-[var(--color-red)]' : 'bg-[var(--color-surface2)] border border-[var(--color-border)] text-[var(--color-text)]'}`}>
              {muted ? <MicOff size={20} /> : <Mic size={20} />}
            </button>
            {callType === 'video' && (
              <button onClick={toggleCam} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all active:scale-95 ${camOff ? 'bg-[var(--color-red)]/20 text-[var(--color-red)]' : 'bg-[var(--color-surface2)] border border-[var(--color-border)] text-[var(--color-text)]'}`}>
                {camOff ? <VideoOff size={20} /> : <Video size={20} />}
              </button>
            )}
            <button onClick={endCall} className="w-14 h-14 rounded-full bg-[var(--color-red)] flex items-center justify-center shadow-lg shadow-red-500/30 active:scale-95 transition-transform">
              <PhoneOff size={20} className="text-white" />
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function ConnectedView() {

    if (messages.length > prevMsgLen && tab !== 'chat') {
      setUnreadChat(p => p + (messages.length - prevMsgLen));
    }
    setPrevMsgLen(messages.length);
  }, [messages.length, tab, prevMsgLen]);

  useEffect(() => {
    if (transfers.length > prevTxLen && tab !== 'files') {
      setUnreadFiles(p => p + (transfers.length - prevTxLen));
    }
    setPrevTxLen(transfers.length);

          {callStatus === 'idle' && (

                title="Voice Call"

                <Phone size={14} />

            title="Disconnect"
          >
            <LogOut size={14} />
          </button>
        </div>
      </div>

      {/* Content */}
      <div className="flex-1 overflow-hidden">
        {tab === 'chat' ? <ChatView /> : <FileView />}
      </div>

      {/* Tab Bar */}
      <div className="flex glass-strong flex-shrink-0 z-20">
        {([
          { key: 'chat' as const, icon: MessageSquare, label: 'Chat', badge: unreadChat },
